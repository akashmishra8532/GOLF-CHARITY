version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: golf-charity-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: golf-charity
    volumes:
      - mongodb_data:/data/db
    networks:
      - golf-charity-network

  backend:
    build: ./backend
    container_name: golf-charity-backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/golf-charity?authSource=admin
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=http://localhost:5173,http://localhost:80
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_MONTHLY=${STRIPE_PRICE_MONTHLY}
      - STRIPE_PRICE_YEARLY=${STRIPE_PRICE_YEARLY}
      - ADMIN_EMAIL=admin@golfcharity.com
      - ADMIN_PASSWORD=password123
      - UPLOAD_DIR=./uploads
      - MAX_FILE_SIZE=5242880
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - mongodb
    networks:
      - golf-charity-network

  frontend:
    build: ./frontend
    container_name: golf-charity-frontend
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:4000
    depends_on:
      - backend
    networks:
      - golf-charity-network

volumes:
  mongodb_data:
  backend_uploads:

networks:
  golf-charity-network:
    driver: bridge
